name: Check source branch

on:
  pull_request:
    branches: [dev]

jobs:
  check-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Validate source branch
        run: |
          ALLOWED="^(sh1sh4k1n9|ch3zych3z|KarasssDev)/.+"
          SOURCE="${{ github.head_ref }}"
          if [[ ! "$SOURCE" =~ $ALLOWED ]]; then
            echo "❌ Merge allowed only from branches with next prefixes: sh1sh4k1n9/, ch3zych3z/, KarasssDev/"
            echo "   Current branch: $SOURCE"
            exit 1
          fi
          echo "✅ Merge from branch $SOURCE allowed"